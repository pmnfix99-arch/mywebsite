<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เข้าสู่ระบบ - Team Connect Chainat Passport</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 14px 14px 20px;
    background: linear-gradient(135deg, #ffffff 0%, #f1f7ec 55%, #e3efd8 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", Tahoma, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  button { font-family: inherit; }
  .wrap { width: 100%; max-width: 380px; }

  .brand-center { text-align: center; margin-bottom: 1.2rem; }
  .brand-center .brand { font-size: 20px; font-weight: 700; color: #16233d; letter-spacing: 0.5px; }
  .brand-center .brand .accent { color: #3f7a1f; }
  .brand-center .tagline { font-size: 11px; color: #8a97ac; margin-top: 4px; }

  .card {
    background: #fdfdfe;
    border-radius: 22px;
    border: 1px solid #eceff4;
    padding: 1.4rem 1.2rem 1.3rem;
    box-shadow: 0 12px 32px rgba(30,60,110,0.10), 0 2px 8px rgba(30,60,110,0.06);
  }

  .role-switch {
    display: flex; background: #f1f4f9; border-radius: 12px; padding: 4px; margin-bottom: 1.3rem;
  }
  .role-btn {
    flex: 1; border: none; background: transparent; padding: 10px 6px; border-radius: 9px;
    font-size: 13px; font-weight: 700; color: #6f89ab; cursor: pointer; transition: all 0.15s ease;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .role-btn.active { background: #3f7a1f; color: #ffffff; box-shadow: 0 3px 8px rgba(63,122,31,0.3); }

  .field-block { margin-bottom: 14px; }
  .field-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .icon-circle {
    width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
    background: #3f7a1f; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(63,122,31,0.35);
  }
  .icon-circle i { font-size: 14px; color: #ffffff; }
  .field-head label { font-size: 13px; color: #16233d; }
  input[type="text"], input[type="password"] {
    width: 100%; height: 42px; border-radius: 10px; border: 1px solid #d4dbe6;
    padding: 0 12px; font-size: 14px; background: #ffffff; color: #16233d;
  }
  input::placeholder { color: #b3bccb; }
  input:focus { outline: none; border-color: #5fae35; box-shadow: 0 0 0 2px rgba(95,174,53,0.15); }

  .btn-primary {
    width: 100%; margin-top: 8px; font-size: 14px; height: 46px; border-radius: 12px;
    background: #3f7a1f; color: #ffffff; border: none; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 12px rgba(63,122,31,0.28);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    display: none; font-size: 12px; color: #c0392b; background: #fdecea; border-radius: 8px;
    padding: 8px 10px; margin-bottom: 12px;
  }

  .footer { text-align: center; margin-top: 1rem; font-size: 10px; color: #9aa7ba; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand-center">
    <div class="brand">TEAM <span class="accent">CONNECT CHAINAT</span></div>
    <div class="tagline">✦ เข้าสู่ระบบ PASSPORT ✦</div>
  </div>

  <div class="card">
    <div class="role-switch">
      <button type="button" class="role-btn active" id="roleUserBtn" onclick="setRole('user')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"></path></svg>
        ผู้ใช้งาน
      </button>
      <button type="button" class="role-btn" id="roleApproverBtn" onclick="setRole('approver')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2l4-4"></path><circle cx="12" cy="12" r="9"></circle></svg>
        ผู้อนุมัติ
      </button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field-block">
      <div class="field-head">
        <div class="icon-circle"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"></path></svg></div>
        <label>Username</label>
      </div>
      <input type="text" id="username" placeholder="กรอก Username" autocomplete="username" />
    </div>

    <div class="field-block">
      <div class="field-head">
        <div class="icon-circle"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg></div>
        <label>Password</label>
      </div>
      <input type="password" id="password" placeholder="กรอก Password" autocomplete="current-password" />
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      เข้าสู่ระบบ
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6l-6 6"></path></svg>
    </button>
  </div>

  <div class="footer">✦ PASSPORT ✦</div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyO96avgC5YUxykS-RTP_SfsTBxaaNkt8aH4x5-Zk5IqNhg39xw4CrjBAxdg0r2tNBzEQ/exec';
  const SESSION_KEY = 'tcp_user';
  let currentRole = 'user';

  function setRole(role) {
    currentRole = role;
    document.getElementById('roleUserBtn').classList.toggle('active', role === 'user');
    document.getElementById('roleApproverBtn').classList.toggle('active', role === 'approver');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function restoreSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      const session = JSON.parse(raw);
      if (!session.sessionExpiresAt || new Date(session.sessionExpiresAt).getTime() <= Date.now()) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
      return session;
    } catch (err) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
  }

  async function callApi(payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    document.getElementById('errorMsg').style.display = 'none';

    if (!username || !password) {
      showError('Please enter username and password');
      return;
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const result = await callApi({ action: 'login', username, password, role: currentRole });
      if (!result.ok) {
        showError(result.message || 'Login failed');
        btn.disabled = false;
        btn.innerHTML = 'เข้าสู่ระบบ <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6l-6 6"></path></svg>';
        return;
      }

      localStorage.setItem(SESSION_KEY, JSON.stringify({
        employeeId: result.employeeId,
        fullName: result.fullName,
        nickname: result.nickname,
        department: result.department,
        photo: result.photo,
        role: result.role,
        sessionExpiresAt: result.sessionExpiresAt
      }));

      window.location.href = result.role === 'approver' ? 'approver.html' : 'user.html';
    } catch (err) {
      showError('Unable to connect to the server');
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบ <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6l-6 6"></path></svg>';
    }
  }

  const existingSession = restoreSession();
  if (existingSession) {
    window.location.href = existingSession.role === 'approver' ? 'approver.html' : 'user.html';
  }
</script>
</body>
</html>
