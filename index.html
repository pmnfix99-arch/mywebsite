<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Connect Passport</title>
<style>
  :root {
    --bg-start: #fbfaf6;
    --bg-end: #eef3e7;
    --paper: #fffefd;
    --line: #d9dccd;
    --line-strong: #c1c9b1;
    --ink: #1f3340;
    --muted: #7f8a7b;
    --brand: #495f2e;
    --brand-soft: #dfe8cf;
    --pending: #9aa19a;
    --approved: #2f6b3f;
    --danger: #b84b4b;
    --shadow: 0 18px 50px rgba(61, 73, 40, 0.14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "Noto Sans Thai", Tahoma, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 0%, rgba(197, 186, 120, 0.12), transparent 22%),
      radial-gradient(circle at 80% 20%, rgba(108, 133, 68, 0.08), transparent 25%),
      linear-gradient(145deg, var(--bg-start), var(--bg-end));
  }

  .hidden { display: none !important; }

  .app-shell {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 10px 24px;
  }

  .panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 30px;
    box-shadow: var(--shadow);
  }

  .login-screen {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }

  .login-card {
    width: min(460px, 100%);
    padding: 26px;
    position: relative;
    overflow: hidden;
  }

  .login-card::before,
  .passport-card::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px dashed var(--line);
    border-radius: 22px;
    pointer-events: none;
  }

  .login-title,
  .page-title {
    text-align: center;
    margin: 0;
    color: var(--ink);
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .login-title { font-size: 32px; margin-top: 20px; }
  .page-title { font-size: 38px; }

  .subtitle,
  .page-subtitle {
    text-align: center;
    color: var(--muted);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .subtitle { margin: 8px 0 24px; font-size: 13px; }
  .page-subtitle { margin: 8px 0 10px; font-size: 16px; }

  .section-blurb {
    text-align: center;
    color: #60685c;
    font-size: 15px;
    margin: 0 0 24px;
  }

  .login-grid {
    display: grid;
    gap: 14px;
  }

  .form-group {
    display: grid;
    gap: 6px;
  }

  label {
    font-size: 14px;
    color: #495445;
    font-weight: 600;
  }

  input,
  textarea,
  select {
    width: 100%;
    border: 1px solid var(--line-strong);
    background: #fff;
    border-radius: 16px;
    padding: 12px 14px;
    font: inherit;
    color: var(--ink);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  input:focus,
  textarea:focus,
  select:focus {
    outline: none;
    border-color: #8ca26a;
    box-shadow: 0 0 0 3px rgba(140, 162, 106, 0.16);
  }

  .pending-field,
  .pending-field textarea,
  .pending-field input {
    color: var(--pending);
  }

  .readonly-field,
  .readonly-field textarea,
  .readonly-field input {
    background: #f6f7f4;
  }

  .btn-row,
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  button {
    font: inherit;
    cursor: pointer;
  }

  .btn {
    border: 1px solid var(--line-strong);
    background: #fff;
    border-radius: 999px;
    padding: 12px 18px;
    color: var(--ink);
    font-size: 16px;
  }

  .btn-primary {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
  }

  .btn-danger {
    background: #fff4f4;
    color: var(--danger);
    border-color: #e6c2c2;
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .app-header {
    display: grid;
    gap: 12px;
    margin-bottom: 12px;
  }

  .brand-block h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 800;
  }

  .brand-block p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .user-chip {
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255,255,255,0.78);
    font-size: 14px;
    text-align: center;
  }

  .workspace {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .sidebar,
  .content {
    padding: 14px;
  }

  .menu-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--muted);
    margin: 2px 2px 10px;
  }

  .nav-list {
    display: grid;
    gap: 10px;
  }

  .nav-btn {
    width: 100%;
    text-align: left;
    padding: 12px 16px;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.74);
    font-size: 14px;
  }

  .nav-btn.active {
    background: var(--brand-soft);
    border-color: #a9b995;
    color: #2f4521;
    font-weight: 700;
  }

  .record-box {
    margin-top: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: #fafbf8;
    display: grid;
    gap: 12px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .status-pending {
    background: #f0f1ee;
    color: #7f867d;
  }

  .status-approved {
    background: #e3f1e6;
    color: var(--approved);
  }

  .status-draft {
    background: #f6f0e1;
    color: #8d6f28;
  }

  .passport-card {
    position: relative;
    padding: 18px 16px 18px;
    min-height: auto;
    overflow: hidden;
  }

  .passport-card::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-top: 46px solid #3f7a1f;
    border-right: 46px solid transparent;
    border-top-left-radius: 30px;
  }

  .brand-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .grace {
    font-size: 28px;
    letter-spacing: 0.04em;
    color: #81907f;
    font-style: italic;
    font-family: Georgia, "Times New Roman", serif;
  }

  .orb {
    width: 40px;
    height: 40px;
    border: 1px solid var(--line-strong);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--brand);
    font-size: 18px;
    background: #fcfdf9;
    margin-top: 10px;
  }

  .heading-block {
    text-align: center;
    margin-bottom: 12px;
  }

  .note-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    margin-bottom: 8px;
    font-size: 12px;
  }

  .note-line::before,
  .note-line::after {
    content: "";
    width: 56px;
    height: 1px;
    background: var(--line);
  }

  .page-grid {
    display: grid;
    gap: 10px;
  }

  .two-col {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .three-col {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .card-field,
  .stamp-card {
    border: 1px solid var(--line);
    border-radius: 18px;
    background: #fff;
    padding: 12px;
  }

  .card-field h3,
  .stamp-card h3 {
    margin: 0 0 10px;
    font-size: 16px;
  }

  .hero-box {
    min-height: 180px;
  }

  .photo-box {
    width: 132px;
    height: 132px;
    margin: 0 auto;
    border: 1px dashed var(--line-strong);
    border-radius: 20px;
    background: #f7f9f2;
    display: grid;
    place-items: center;
    text-align: center;
    overflow: hidden;
  }

  .photo-placeholder {
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
  }

  .upload-row {
    border: 1px solid var(--line-strong);
    border-radius: 16px;
    background: #fff;
    padding: 10px 12px;
  }

  .upload-row input[type="file"] {
    padding: 0;
    border: 0;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
  }

  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: #3b4740;
    margin-bottom: 4px;
  }

  .field-input,
  .field-input textarea,
  .field-input input {
    min-height: 38px;
    border-radius: 14px;
    border-color: var(--line-strong);
    font-size: 14px;
    padding: 10px 12px;
  }

  .photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .signature-pad {
    border: 1px dashed var(--line-strong);
    border-radius: 16px;
    background: #fff;
    min-height: 88px;
    position: relative;
    overflow: hidden;
  }

  .signature-pad canvas {
    width: 100%;
    height: 88px;
    display: block;
  }

  .inline-meta {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .footer-mark {
    margin-top: 18px;
    text-align: center;
    color: #798172;
    letter-spacing: 0.2em;
    font-size: 11px;
  }

  .approval-panel {
    margin-top: 12px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: #fbfbf8;
  }

  .approval-list {
    display: grid;
    gap: 12px;
  }

  .approval-item {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    background: #fff;
  }

  .approval-item h4 {
    margin: 0 0 6px;
  }

  .approval-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .message {
    min-height: 18px;
    font-size: 12px;
  }

  .pending-field .field-input,
  .pending-field .field-input::placeholder,
  .pending-field textarea,
  .pending-field input {
    color: var(--pending);
  }

  .message.error { color: var(--danger); }
  .message.success { color: var(--approved); }

  @media (min-width: 700px) {
    .two-col,
    .three-col,
    .inline-meta {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .app-shell {
      max-width: 760px;
    }

    .workspace {
      grid-template-columns: 240px 1fr;
    }

    .app-header {
      grid-template-columns: 1fr auto;
      align-items: start;
    }

    .brand-block h1 {
      font-size: 26px;
    }

    .brand-block p {
      font-size: 15px;
    }

    .toolbar {
      justify-content: flex-end;
    }

    .photo-box {
      width: 176px;
      height: 176px;
    }

    .field-label {
      font-size: 15px;
    }

    .field-input,
    .field-input textarea,
    .field-input input {
      min-height: 46px;
      font-size: 16px;
    }

    .page-title {
      font-size: 28px;
    }

    .page-subtitle {
      font-size: 15px;
    }
  }
</style>
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card panel">
      <div class="brand-top">
        <div class="orb">◎</div>
        <div class="grace">grace</div>
      </div>
      <h1 class="login-title">TEAM CONNECT</h1>
      <div class="subtitle">Passport Login</div>
      <p class="section-blurb">เข้าสู่ระบบเพื่อกรอกข้อมูล, แก้ไข, และส่งอนุมัติ</p>
      <div class="login-grid">
        <div class="form-group">
          <label for="username">รหัสพนักงาน / Username</label>
          <input id="username" type="text" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน / Password</label>
          <input id="password" type="password" autocomplete="current-password" />
        </div>
        <div class="btn-row">
          <button id="loginBtn" class="btn btn-primary" type="button">เข้าสู่ระบบ</button>
        </div>
        <div id="loginMessage" class="message"></div>
      </div>
    </div>
  </section>

  <main id="appScreen" class="hidden">
    <div class="app-shell">
      <div class="app-header">
        <div class="brand-block">
          <h1>Team Connect Passport</h1>
          <p>ระบบกรอกข้อมูล, รออนุมัติ, แก้ไขข้อมูล, และอนุมัติผ่าน Google Sheet</p>
        </div>
        <div class="toolbar">
          <div id="userChip" class="user-chip"></div>
          <button id="refreshBtn" class="btn" type="button">รีเฟรช</button>
          <button id="logoutBtn" class="btn btn-danger" type="button">ออกจากระบบ</button>
        </div>
      </div>

      <div class="workspace">
        <aside class="sidebar panel">
          <div class="menu-title">Passport Pages</div>
          <div id="navList" class="nav-list"></div>
          <div class="record-box">
            <div id="recordStatus"></div>
            <div class="btn-row">
              <button id="saveDraftBtn" class="btn" type="button">บันทึกฉบับแก้ไข</button>
              <button id="submitApproveBtn" class="btn btn-primary" type="button">ส่งรออนุมัติ</button>
            </div>
            <div id="saveMessage" class="message"></div>
          </div>
        </aside>

        <section class="content panel">
          <div id="formContainer"></div>
          <div id="approvalSection" class="approval-panel hidden">
            <h3 style="margin-top:0;">รายการรออนุมัติ</h3>
            <div id="approvalList" class="approval-list"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby1QJmUf_8zJou2ymIZDvcOPntGwqfY5E3bg4XKANIRYeVXg_r7E0y1QWEVPFzJl3uC/exec';

  const pageDefs = [
    { id: 'personal', label: '1. ข้อมูลส่วนตัว', title: 'ข้อมูลส่วนตัว', subtitle: 'Personal Information', kind: 'personal' },
    { id: 'checkpoint', label: '2. กิจกรรมเข้าฐาน', title: 'กิจกรรมเข้าฐาน', subtitle: 'Activity Checkpoint', kind: 'checkpoint' },
    { id: 'step1', label: '3. Step 1 ขึ้นรูป', title: 'ฐานกระบวนการผลิต', subtitle: 'Production Process', kind: 'step', stepLabel: 'STEP 1 ขึ้นรูป' },
    { id: 'step2', label: '4. Step 2 ตัดขอบ', title: 'ฐานกระบวนการผลิต', subtitle: 'Production Process', kind: 'step', stepLabel: 'STEP 2 ตัดขอบ' },
    { id: 'step3', label: '5. Step 3 ตรวจสอบ', title: 'ฐานกระบวนการผลิต', subtitle: 'Production Process', kind: 'step', stepLabel: 'STEP 3 ตรวจสอบ' },
    { id: 'step4', label: '6. Step 4 แพ็คสินค้า', title: 'ฐานกระบวนการผลิต', subtitle: 'Production Process', kind: 'step', stepLabel: 'STEP 4 แพ็คสินค้า' },
    { id: 'learning', label: '7. บันทึกการเรียนรู้', title: 'บันทึกการเรียนรู้', subtitle: 'Learning Notes', kind: 'learning' }
  ];

  const state = {
    session: null,
    forms: {},
    activePage: 'personal',
    approvalItems: [],
    signatureDrawing: false
  };

  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');
  const navList = document.getElementById('navList');
  const formContainer = document.getElementById('formContainer');
  const approvalSection = document.getElementById('approvalSection');
  const approvalList = document.getElementById('approvalList');
  const recordStatus = document.getElementById('recordStatus');
  const saveMessage = document.getElementById('saveMessage');
  const loginMessage = document.getElementById('loginMessage');
  const userChip = document.getElementById('userChip');

  function makeEmptyForms() {
    return {
      personal: { status: 'DRAFT', data: { fullname: '', nickname: '', department: '', photo: '', signature: '' } },
      checkpoint: { status: 'DRAFT', data: {
        standardDate: '', standardNote: '', standardApprover: '',
        sustainDate: '', sustainNote: '', sustainApprover: '',
        labDate: '', labNote: '', labApprover: ''
      } },
      step1: { status: 'DRAFT', data: { details: '', tips: '', caution: '', approverSignature: '', approveDate: '' } },
      step2: { status: 'DRAFT', data: { details: '', tips: '', caution: '', approverSignature: '', approveDate: '' } },
      step3: { status: 'DRAFT', data: { details: '', tips: '', caution: '', approverSignature: '', approveDate: '' } },
      step4: { status: 'DRAFT', data: { details: '', tips: '', caution: '', approverSignature: '', approveDate: '' } },
      learning: { status: 'DRAFT', data: { learned: '', impressed: '', suggestion: '', nextIdea: '', signature: '', date: '' } }
    };
  }

  function showMessage(node, text, type) {
    node.textContent = text || '';
    node.className = 'message' + (type ? ' ' + type : '');
  }

  async function callApi(action, payload) {
    if (!WEB_APP_URL || WEB_APP_URL.includes('PASTE_YOUR')) {
      throw new Error('ยังไม่ได้ใส่ WEB_APP_URL ของ Google Apps Script');
    }

    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...payload })
    });

    const result = await response.json();
    if (result.ok === false) {
      throw new Error(result.message || 'Request failed');
    }

    return result;
  }

  function initNav() {
    navList.innerHTML = '';
    pageDefs.forEach((page) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'nav-btn' + (state.activePage === page.id ? ' active' : '');
      btn.textContent = page.label;
      btn.addEventListener('click', () => {
        syncCurrentForm();
        state.activePage = page.id;
        renderNav();
        renderForm();
      });
      navList.appendChild(btn);
    });
  }

  function renderNav() {
    Array.from(navList.children).forEach((node, index) => {
      node.classList.toggle('active', pageDefs[index].id === state.activePage);
    });
  }

  function currentPageDef() {
    return pageDefs.find((page) => page.id === state.activePage);
  }

  function currentRecord() {
    return state.forms[state.activePage];
  }

  function isPending(record) {
    return record && record.status === 'PENDING';
  }

  function isApproved(record) {
    return record && record.status === 'APPROVED';
  }

  function renderStatus() {
    const record = currentRecord();
    const status = record ? record.status : 'DRAFT';
    let cls = 'status-draft';
    let label = 'DRAFT';
    if (status === 'PENDING') {
      cls = 'status-pending';
      label = 'PENDING';
    } else if (status === 'APPROVED') {
      cls = 'status-approved';
      label = 'APPROVED';
    }

    recordStatus.innerHTML = '<span class="status-pill ' + cls + '">' + label + '</span>';
  }

  function headerTemplate(page, inner) {
    return `
      <div class="passport-card panel">
        <div class="brand-top">
          <div class="orb">◎</div>
          <div class="grace">grace</div>
        </div>
        <div class="heading-block">
          <div class="note-line">TEAM CONNECT PASSPORT</div>
          <h2 class="page-title">${page.title}</h2>
          <div class="page-subtitle">${page.subtitle}</div>
          ${page.stepLabel ? `<p class="section-blurb">${page.stepLabel}</p>` : ''}
        </div>
        ${inner}
        <div class="footer-mark">TEAM CONNECT PASSPORT</div>
      </div>
    `;
  }

  function pendingClass(record) {
    return isPending(record) ? 'pending-field' : '';
  }

  function readonlyAttr(record) {
    return isApproved(record) && state.session.role !== 'APPROVER' ? 'readonly' : '';
  }

  function renderPersonal(page, record) {
    const d = record.data;
    return headerTemplate(page, `
      <div class="page-grid ${pendingClass(record)} ${isApproved(record) ? 'readonly-field' : ''}">
        <div class="photo-box">
          ${d.photo ? `<img src="${d.photo}" alt="photo" />` : '<div class="photo-placeholder">ติดรูป / PHOTO</div>'}
        </div>
        <div class="upload-row">
          <input id="photoInput" type="file" accept="image/*" />
        </div>
        <div class="form-group">
          <label class="field-label">ชื่อ - นามสกุล / Name</label>
          <input class="field-input" data-field="fullname" value="${escapeHtml(d.fullname)}" ${readonlyAttr(record)} />
        </div>
        <div class="form-group">
          <label class="field-label">ชื่อเล่น / Nickname</label>
          <input class="field-input" data-field="nickname" value="${escapeHtml(d.nickname)}" ${readonlyAttr(record)} />
        </div>
        <div class="form-group">
          <label class="field-label">ฝ่าย / Department</label>
          <input class="field-input" data-field="department" value="${escapeHtml(d.department)}" ${readonlyAttr(record)} />
        </div>
        <div class="form-group">
          <label class="field-label">ลายเซ็น / Signature</label>
          <div class="signature-pad"><canvas id="signatureCanvas"></canvas></div>
          <div class="btn-row">
            <button id="clearSignatureBtn" class="btn" type="button">ล้างลายเซ็น</button>
          </div>
        </div>
      </div>
    `);
  }

  function renderCheckpoint(page, record) {
    const d = record.data;
    return headerTemplate(page, `
      <div class="page-grid ${pendingClass(record)} ${isApproved(record) ? 'readonly-field' : ''}">
        <div class="three-col">
          ${renderCheckpointCard('ระบบมาตรฐาน', 'standard', d, record)}
          ${renderCheckpointCard('ความยั่งยืน', 'sustain', d, record)}
          ${renderCheckpointCard('LAB กรีง', 'lab', d, record)}
        </div>
      </div>
    `);
  }

  function renderCheckpointCard(label, prefix, d, record) {
    return `
      <div class="stamp-card">
        <h3>${label}</h3>
        <div class="form-group">
          <label>วันที่ / Date</label>
          <input data-field="${prefix}Date" value="${escapeHtml(d[prefix + 'Date'])}" ${readonlyAttr(record)} />
        </div>
        <div class="form-group">
          <label>หมายเหตุ / Note</label>
          <textarea data-field="${prefix}Note" ${readonlyAttr(record)}>${escapeHtml(d[prefix + 'Note'])}</textarea>
        </div>
        <div class="form-group">
          <label>ลายเซ็นผู้ควบคุมฐาน</label>
          <input data-field="${prefix}Approver" value="${escapeHtml(d[prefix + 'Approver'])}" ${readonlyAttr(record)} />
        </div>
      </div>
    `;
  }

  function renderStep(page, record) {
    const d = record.data;
    return headerTemplate(page, `
      <div class="page-grid ${pendingClass(record)} ${isApproved(record) ? 'readonly-field' : ''}">
        <div class="card-field hero-box">
          <div class="form-group">
            <label>พื้นที่สำหรับใส่รายละเอียด / คู่มือ</label>
            <textarea data-field="details" style="min-height:220px;" ${readonlyAttr(record)}>${escapeHtml(d.details)}</textarea>
          </div>
        </div>
        <div class="two-col">
          <div class="card-field">
            <div class="form-group">
              <label>สิ่งที่ควรรู้</label>
              <textarea data-field="tips" ${readonlyAttr(record)}>${escapeHtml(d.tips)}</textarea>
            </div>
          </div>
          <div class="card-field">
            <div class="form-group">
              <label>ข้อควรระวัง</label>
              <textarea data-field="caution" ${readonlyAttr(record)}>${escapeHtml(d.caution)}</textarea>
            </div>
          </div>
        </div>
        <div class="inline-meta">
          <div class="form-group">
            <label>ลายเซ็นผู้ควบคุมฐาน</label>
            <input data-field="approverSignature" value="${escapeHtml(d.approverSignature)}" ${readonlyAttr(record)} />
          </div>
          <div class="form-group">
            <label>วันที่</label>
            <input data-field="approveDate" value="${escapeHtml(d.approveDate)}" ${readonlyAttr(record)} />
          </div>
        </div>
      </div>
    `);
  }

  function renderLearning(page, record) {
    const d = record.data;
    return headerTemplate(page, `
      <div class="page-grid ${pendingClass(record)} ${isApproved(record) ? 'readonly-field' : ''}">
        <div class="card-field"><div class="form-group"><label>1. สิ่งที่ได้เรียนรู้</label><textarea data-field="learned" ${readonlyAttr(record)}>${escapeHtml(d.learned)}</textarea></div></div>
        <div class="card-field"><div class="form-group"><label>2. สิ่งที่ประทับใจ</label><textarea data-field="impressed" ${readonlyAttr(record)}>${escapeHtml(d.impressed)}</textarea></div></div>
        <div class="card-field"><div class="form-group"><label>3. ข้อเสนอแนะ</label><textarea data-field="suggestion" ${readonlyAttr(record)}>${escapeHtml(d.suggestion)}</textarea></div></div>
        <div class="card-field"><div class="form-group"><label>4. ไอเดียที่นำไปใช้ต่อ</label><textarea data-field="nextIdea" ${readonlyAttr(record)}>${escapeHtml(d.nextIdea)}</textarea></div></div>
        <div class="inline-meta">
          <div class="form-group">
            <label>ลายเซ็น / Signature</label>
            <input data-field="signature" value="${escapeHtml(d.signature)}" ${readonlyAttr(record)} />
          </div>
          <div class="form-group">
            <label>วันที่ / Date</label>
            <input data-field="date" value="${escapeHtml(d.date)}" ${readonlyAttr(record)} />
          </div>
        </div>
      </div>
    `);
  }

  function renderForm() {
    const page = currentPageDef();
    const record = currentRecord();
    renderStatus();

    let html = '';
    if (page.kind === 'personal') html = renderPersonal(page, record);
    if (page.kind === 'checkpoint') html = renderCheckpoint(page, record);
    if (page.kind === 'step') html = renderStep(page, record);
    if (page.kind === 'learning') html = renderLearning(page, record);

    formContainer.innerHTML = html;
    bindDynamicControls();
  }

  function bindDynamicControls() {
    const record = currentRecord();
    const photoInput = document.getElementById('photoInput');
    if (photoInput) {
      photoInput.disabled = isApproved(record) && state.session.role !== 'APPROVER';
      photoInput.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        state.forms.personal.data.photo = await fileToDataUrl(file);
        renderForm();
      });
    }

    const signatureCanvas = document.getElementById('signatureCanvas');
    if (signatureCanvas) {
      setupSignaturePad(signatureCanvas, state.forms.personal.data.signature || '', isApproved(record) && state.session.role !== 'APPROVER');
      const clearBtn = document.getElementById('clearSignatureBtn');
      clearBtn.disabled = isApproved(record) && state.session.role !== 'APPROVER';
      clearBtn.addEventListener('click', () => {
        state.forms.personal.data.signature = '';
        setupSignaturePad(signatureCanvas, '', false);
      });
    }
  }

  function setupSignaturePad(canvas, initialDataUrl, readOnly) {
    const ctx = canvas.getContext('2d');
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#495f2e';

    if (initialDataUrl) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
      img.src = initialDataUrl;
    }

    if (readOnly) return;

    let drawing = false;
    const getPos = (event) => {
      const point = event.touches ? event.touches[0] : event;
      const box = canvas.getBoundingClientRect();
      return { x: point.clientX - box.left, y: point.clientY - box.top };
    };

    const start = (event) => {
      drawing = true;
      const p = getPos(event);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      event.preventDefault();
    };

    const move = (event) => {
      if (!drawing) return;
      const p = getPos(event);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      state.forms.personal.data.signature = canvas.toDataURL('image/png');
      event.preventDefault();
    };

    const end = () => { drawing = false; };

    canvas.onmousedown = start;
    canvas.onmousemove = move;
    canvas.onmouseup = end;
    canvas.onmouseleave = end;
    canvas.ontouchstart = start;
    canvas.ontouchmove = move;
    canvas.ontouchend = end;
  }

  function syncCurrentForm() {
    const record = currentRecord();
    if (!record) return;
    if (isApproved(record) && state.session.role !== 'APPROVER') return;

    formContainer.querySelectorAll('[data-field]').forEach((node) => {
      record.data[node.dataset.field] = node.value;
    });
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function login() {
    try {
      showMessage(loginMessage, 'กำลังเข้าสู่ระบบ...', '');
      const result = await callApi('login', {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      });

      state.session = result.session;
      state.forms = { ...makeEmptyForms(), ...(result.forms || {}) };
      state.approvalItems = result.pendingItems || [];
      state.activePage = 'personal';

      userChip.textContent = state.session.displayName + ' • ' + state.session.role;
      loginScreen.classList.add('hidden');
      appScreen.classList.remove('hidden');
      initNav();
      renderForm();
      renderApproval();
      showMessage(loginMessage, '', '');
    } catch (error) {
      showMessage(loginMessage, error.message, 'error');
    }
  }

  async function refreshData() {
    try {
      syncCurrentForm();
      const result = await callApi('getForms', {
        username: state.session.username,
        role: state.session.role
      });
      state.forms = { ...makeEmptyForms(), ...(result.forms || {}) };
      state.approvalItems = result.pendingItems || [];
      renderForm();
      renderApproval();
    } catch (error) {
      showMessage(saveMessage, error.message, 'error');
    }
  }

  async function saveForm(nextStatus) {
    try {
      syncCurrentForm();
      const record = currentRecord();
      const pageId = state.activePage;
      const status = nextStatus || record.status || 'DRAFT';
      record.status = status;

      showMessage(saveMessage, 'กำลังบันทึก...', '');
      const result = await callApi('saveForm', {
        username: state.session.username,
        role: state.session.role,
        pageId,
        status,
        data: record.data
      });

      state.forms[pageId] = result.record;
      showMessage(saveMessage, status === 'PENDING' ? 'ส่งรออนุมัติแล้ว' : 'บันทึกข้อมูลเรียบร้อย', 'success');
      renderForm();
      if (state.session.role === 'APPROVER') {
        await refreshData();
      }
    } catch (error) {
      showMessage(saveMessage, error.message, 'error');
    }
  }

  function renderApproval() {
    if (state.session.role !== 'APPROVER') {
      approvalSection.classList.add('hidden');
      return;
    }

    approvalSection.classList.remove('hidden');
    approvalList.innerHTML = '';

    if (!state.approvalItems.length) {
      approvalList.innerHTML = '<div class="approval-item">ไม่มีรายการรออนุมัติ</div>';
      return;
    }

    state.approvalItems.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'approval-item';
      card.innerHTML = `
        <h4>${item.pageLabel}</h4>
        <div class="approval-meta">${item.displayName} • ${item.username} • ${item.updatedAt}</div>
        <div class="btn-row">
          <button class="btn btn-primary" type="button" data-approve="${item.username}|${item.pageId}">อนุมัติ</button>
        </div>
      `;
      approvalList.appendChild(card);
    });

    approvalList.querySelectorAll('[data-approve]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const [username, pageId] = btn.dataset.approve.split('|');
        try {
          btn.disabled = true;
          await callApi('approveForm', {
            approver: state.session.username,
            username,
            pageId
          });
          await refreshData();
        } catch (error) {
          btn.disabled = false;
          alert(error.message);
        }
      });
    });
  }

  function logout() {
    state.session = null;
    state.forms = makeEmptyForms();
    state.approvalItems = [];
    document.getElementById('password').value = '';
    appScreen.classList.add('hidden');
    loginScreen.classList.remove('hidden');
  }

  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('refreshBtn').addEventListener('click', refreshData);
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('saveDraftBtn').addEventListener('click', () => saveForm('DRAFT'));
  document.getElementById('submitApproveBtn').addEventListener('click', () => saveForm('PENDING'));

  initNav();
</script>
</body>
</html>
