<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Connect Passport</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 14px;
    background: linear-gradient(135deg, #ffffff 0%, #f1f7ec 55%, #e3efd8 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", Tahoma, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  button { font-family: inherit; }
  .wrap { width: 100%; max-width: 380px; text-align: center; }

  .brand { font-size: 24px; font-weight: 700; color: #16233d; letter-spacing: 0.5px; }
  .brand .accent { color: #3f7a1f; }
  .tagline { font-size: 12px; color: #8a97ac; margin-top: 6px; margin-bottom: 2.5rem; }

  .spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid #e3efd8; border-top-color: #3f7a1f;
    margin: 0 auto 1.6rem; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-primary {
    width: 100%; font-size: 14px; height: 46px; border-radius: 12px;
    background: #3f7a1f; color: #ffffff; border: none; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 12px rgba(63,122,31,0.28);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary:active { transform: scale(0.99); }

  .footer { margin-top: 1.4rem; font-size: 10px; color: #9aa7ba; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">TEAM <span class="accent">CONNECT</span></div>
  <div class="tagline">✦ PASSPORT ✦</div>

  <div class="spinner" id="spinner"></div>

  <button class="btn-primary" id="goBtn" onclick="goToLogin()" style="display:none;">
    เข้าสู่ระบบ
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6l-6 6"></path></svg>
  </button>

  <div class="footer">✦ PASSPORT ✦</div>
</div>

<script>
  // ถ้าเคยล็อกอินไว้แล้ว (มีข้อมูลผู้ใช้เก็บอยู่) พาไปหน้าที่ตรงกับ role ทันที ไม่ต้องล็อกอินซ้ำ
  // ถ้ายังไม่เคยล็อกอิน พาไปหน้า login.html
  function goToLogin() {
    window.location.href = 'login.html';
  }

  function route() {
    let user = null;
    try {
      user = JSON.parse(localStorage.getItem('tcp_user') || 'null');
    } catch (err) {
      user = null;
    }

    if (user && user.role === 'approver') {
      window.location.href = 'approver.html';
    } else if (user && user.role === 'user') {
      window.location.href = 'user.html';
    } else {
      window.location.href = 'login.html';
    }
  }

  // หน่วงเล็กน้อยให้เห็นหน้า splash ก่อนเด้งไปหน้าถัดไป
  setTimeout(route, 500);

  // เผื่อ redirect อัตโนมัติไม่ทำงาน (เช่น JS ถูกบล็อกบางส่วน) โชว์ปุ่มให้กดเองหลังจากรอสักครู่
  setTimeout(() => {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('goBtn').style.display = 'flex';
  }, 2500);
</script>
</body>
</html>
