<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ข้อมูลส่วนตัว - Team Connect Passport</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 14px 14px 20px;
    background: linear-gradient(135deg, #ffffff 0%, #f1f7ec 55%, #e3efd8 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", Tahoma, sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  button { font-family: inherit; }
  .wrap { width: 100%; max-width: 380px; }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.6rem;
  }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    color: #5fae35; padding: 0; flex: none;
  }
  .icon-btn:active { transform: scale(0.92); }
  .brand-center { text-align: center; flex: 1; }
  .brand-center img { height: 26px; width: auto; display: block; margin: 0 auto; }
  .brand-center .tagline { font-size: 7.5px; color: #8a97ac; letter-spacing: 0.2px; margin-top: 2px; }

  /* ---------- Stepper ---------- */
  .stepper-outer {
    margin: 0 -14px 0.9rem; padding: 0 10px;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .stepper-outer::-webkit-scrollbar { display: none; }
  .stepper {
    display: flex; align-items: flex-start; width: max-content; padding: 4px 4px 2px;
  }
  .step-item {
    display: flex; flex-direction: column; align-items: center; width: 58px; flex: none;
    background: none; border: none; padding: 0; cursor: pointer; color: inherit;
  }
  .step-row { display: flex; align-items: center; }
  .step-circle {
    width: 26px; height: 26px; min-width: 26px; border-radius: 50%;
    border: 1.5px solid #c7cedc; background: #ffffff; color: #8a97ac;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; transition: all 0.15s ease;
  }
  .step-line { width: 20px; height: 1.5px; background: #d4dbe6; flex: none; transition: background 0.15s ease; }
  .step-label {
    display: flex; flex-direction: column; align-items: center; margin-top: 4px;
    font-size: 8.5px; line-height: 1.25; color: #9aa7ba; text-align: center; white-space: nowrap;
  }
  .step-item.active .step-circle {
    background: #3f7a1f; border-color: #3f7a1f; color: #ffffff;
    box-shadow: 0 3px 8px rgba(63,122,31,0.35);
  }
  .step-item.active .step-label { color: #3f7a1f; font-weight: 700; }
  .step-item.done .step-circle { background: #5fae35; border-color: #5fae35; color: #ffffff; }
  .step-item.done .step-line, .step-item.done + .step-item .step-line { background: #5fae35; }
  .step-item.done .step-label { color: #5fae35; }

  /* ---------- Section title ---------- */
  .row-line { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 0.35rem; }
  .line { height: 0.5px; background: #b9c7dd; }
  .row-line .line { flex: 1; }
  .star { font-size: 10px; color: #5fae35; }
  h1 {
    font-size: 18px; font-weight: 700; text-align: center; margin: 0; color: #16233d;
  }
  .sub-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; margin-bottom: 0.8rem; }
  .sub-row .line { width: 60px; }
  .sub-row .star { font-size: 8px; }

  /* ---------- Card ---------- */
  .card {
    position: relative;
    background: #fdfdfe;
    border-radius: 22px;
    border: 1px solid #eceff4;
    padding: 1.2rem 1.1rem 1rem;
    box-shadow: 0 12px 32px rgba(30,60,110,0.10), 0 2px 8px rgba(30,60,110,0.06);
  }

  .photo-wrap { display: flex; justify-content: center; margin-bottom: 0.25rem; }
  .photo-box {
    width: 108px; height: 108px; border-radius: 50%;
    border: 1.5px dashed #a9c0e0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px; cursor: pointer;
    background: #f4f7fc; overflow: hidden; position: relative;
  }
  .photo-box img { display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .photo-box .cam-wrap { position: relative; }
  .photo-box .cam-icon { font-size: 28px; color: #5fae35; display: block; }
  .photo-box .plus-badge {
    position: absolute; top: -3px; right: -8px; width: 15px; height: 15px; border-radius: 50%;
    background: #3f7a1f; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 5px rgba(63,122,31,0.4);
  }
  .photo-box .plus-badge svg { width: 9px; height: 9px; }
  .photo-box .hint { font-size: 10px; font-weight: 700; color: #3f7a1f; }
  .photo-caption { text-align: center; font-size: 10.5px; color: #8a97ac; margin-bottom: 0.9rem; }
  .photo-actions { display: none; justify-content: center; gap: 16px; margin-bottom: 0.6rem; margin-top: -0.5rem; }
  .photo-actions button {
    font-size: 11px; padding: 4px 10px; border-radius: 8px; border: 0.5px solid #c7cdd6;
    background: #ffffff; cursor: pointer;
  }
  .photo-actions button.danger { color: #c0392b; }

  .field-block { padding-bottom: 14px; }
  .field-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .icon-circle {
    width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
    background: #3f7a1f; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(63,122,31,0.35);
  }
  .icon-circle i { font-size: 14px; color: #ffffff; }
  .field-head label { font-size: 13px; color: #16233d; }
  .field-head label .en { color: #6f89ab; }
  input[type="text"], select.field-select {
    width: 100%; height: 38px; border-radius: 10px; border: 1px solid #d4dbe6;
    padding: 0 12px; font-size: 13px; background: #ffffff; color: #16233d;
  }
  input[type="text"]::placeholder { color: #b3bccb; }
  input[type="text"]:focus, select.field-select:focus {
    outline: none; border-color: #5fae35; box-shadow: 0 0 0 2px rgba(95,174,53,0.15);
  }
  .select-wrap { position: relative; }
  select.field-select {
    appearance: none; -webkit-appearance: none; -moz-appearance: none; cursor: pointer;
  }
  select.field-select:invalid { color: #b3bccb; }
  .select-wrap .chevron {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    pointer-events: none; color: #8a97ac;
  }

  .btn-primary {
    width: 100%; margin-top: 6px; font-size: 14px; height: 44px; border-radius: 12px;
    background: #3f7a1f; color: #ffffff; border: none; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 12px rgba(63,122,31,0.28);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary:active { transform: scale(0.99); }

  .placeholder-img {
    width: 100%; height: 230px; border-radius: 16px;
    border: 1.5px dashed #a9c0e0; background: #f4f7fc;
    display: flex; align-items: center; justify-content: center;
  }

  /* ---------- Footer ---------- */
  .skyline-wrap { position: relative; margin-top: 0.9rem; margin-left: 0; margin-right: 0; overflow: hidden; height: 42px; }
  .skyline { display: block; width: 100%; height: 42px; opacity: 0.55; }
  .footer { text-align: center; position: relative; margin-top: -6px; }
  .footer .brand { font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; color: #16233d; letter-spacing: 0.5px; }
  .footer .brand .link-icon {
    width: 18px; height: 18px; border-radius: 50%; background: #3f7a1f; display: inline-flex;
    align-items: center; justify-content: center;
  }
  .footer .brand .link-icon i { font-size: 11px; color: #ffffff; }
  .footer .tag { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
  .footer .tag span.txt { font-size: 10px; color: #9aa7ba; letter-spacing: 3px; }
  .footer .tag span.star { font-size: 9px; color: #9aa7ba; }
</style>
</head>

<script>
  const photoInput = document.getElementById('photoInput');
  const photoBox = document.getElementById('photoBox');
  const photoPreview = document.getElementById('photoPreview');
  const camWrap = document.getElementById('camWrap');
  const photoHint = document.getElementById('photoHint');
  const photoActions = document.getElementById('photoActions');
  const photoCaption = document.getElementById('photoCaption');
  const retakeBtn = document.getElementById('retakeBtn');
  const removeBtn = document.getElementById('removeBtn');

  photoBox.addEventListener('click', function () { photoInput.click(); });

  photoInput.addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (ev) {
      photoPreview.src = ev.target.result;
      photoPreview.style.display = 'block';
      camWrap.style.display = 'none';
      photoHint.style.display = 'none';
      photoActions.style.display = 'flex';
      photoCaption.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  retakeBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    photoInput.click();
  });

  removeBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    photoInput.value = '';
    photoPreview.src = '';
    photoPreview.style.display = 'none';
    camWrap.style.display = 'block';
    photoHint.style.display = 'block';
    photoActions.style.display = 'none';
    photoCaption.style.display = 'block';
  });

  // ---------- Stepper interaction ----------
  const stepItems = Array.from(document.querySelectorAll('.step-item'));
  const pageTitles = {
    "1": "ข้อมูลส่วนตัว",
    "2": "กิจกรรมเข้าฐาน",
    "3": "Step 1 ขึ้นรูป",
    "4": "Step 2 ตัดขอบ",
    "5": "Step 3 ตรวจสอบ",
    "6": "Step 4 แพ็คสินค้า",
    "7": "บันทึกการเรียนรู้"
  };
  const pageTitleEl = document.getElementById('pageTitle');
  const panels = Array.from(document.querySelectorAll('.page-panel'));

  function selectStep(stepNum) {
    const targetIndex = stepItems.findIndex(el => el.dataset.step === stepNum);
    stepItems.forEach((el, idx) => {
      el.classList.remove('active', 'done');
      if (idx < targetIndex) el.classList.add('done');
      if (idx === targetIndex) el.classList.add('active');
    });
    const targetEl = stepItems[targetIndex];
    if (targetEl) {
      targetEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    panels.forEach(p => { p.style.display = (p.id === 'page-' + stepNum) ? 'block' : 'none'; });
    if (pageTitleEl && pageTitles[stepNum]) {
      pageTitleEl.textContent = '✦ ' + pageTitles[stepNum] + ' ✦';
    }
  }
  window.selectStep = selectStep;
</script>
