<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>อนุมัติกิจกรรม - Team Connect Passport</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 14px 14px 24px;
    background: linear-gradient(135deg, #ffffff 0%, #f1f7ec 55%, #e3efd8 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", Tahoma, sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  button { font-family: inherit; }
  .wrap { width: 100%; max-width: 420px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
  .brand { font-size: 17px; font-weight: 700; color: #16233d; }
  .brand .accent { color: #3f7a1f; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    color: #5fae35; padding: 0;
  }

  h1 { font-size: 16px; text-align: center; color: #16233d; margin: 0 0 4px; }
  .sub { font-size: 11.5px; text-align: center; color: #8a97ac; margin-bottom: 1rem; }

  .filter-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    font-size: 12.5px; color: #6f89ab;
  }
  .filter-row select {
    flex: 1; height: 36px; border-radius: 10px; border: 1px solid #d4dbe6;
    background: #ffffff; padding: 0 10px; font-size: 12.5px; color: #16233d;
    font-family: inherit;
  }
  .refresh-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .refresh-btn {
    display: flex; align-items: center; gap: 5px; border: none; background: #ffffff;
    border: 1px solid #d4dbe6; border-radius: 20px; padding: 6px 12px; font-size: 11.5px;
    color: #3f7a1f; font-weight: 700; cursor: pointer;
  }

  .empty-state {
    text-align: center; padding: 3rem 1rem; color: #8a97ac; font-size: 13px;
  }

  .approval-card {
    background: #fdfdfe; border-radius: 18px; border: 1px solid #eceff4;
    padding: 1rem 1.1rem; margin-bottom: 12px;
    box-shadow: 0 8px 22px rgba(30,60,110,0.08), 0 2px 6px rgba(30,60,110,0.05);
  }
  .approval-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .approval-head .name { font-size: 14px; font-weight: 700; color: #16233d; }
  .approval-head .activity { font-size: 12px; color: #3f7a1f; font-weight: 700; margin-top: 2px; }
  .status-tag {
    font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
    background: #fff6e0; color: #b8860b; white-space: nowrap;
  }
  .approval-detail { font-size: 12px; color: #6f89ab; margin-bottom: 10px; line-height: 1.6; }
  .approval-detail b { color: #16233d; }
  .approval-actions { display: flex; gap: 8px; }
  .btn-approve, .btn-reject {
    flex: 1; height: 38px; border-radius: 10px; border: none; font-weight: 700; font-size: 12.5px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-approve { background: #3f7a1f; color: #ffffff; }
  .btn-reject { background: #ffffff; color: #c0392b; border: 1.5px solid #f0c4bd; }
  .btn-approve:disabled, .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #16233d; color: #ffffff; font-size: 12.5px; padding: 10px 18px;
    border-radius: 20px; opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">TEAM <span class="accent">CONNECT</span></div>
    <button type="button" class="icon-btn" aria-label="ออกจากระบบ" onclick="logout()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5l-5-5"></path><path d="M21 12H9"></path></svg>
    </button>
  </div>

  <h1>✦ รออนุมัติกิจกรรม ✦</h1>
  <div class="sub" id="approverNameLabel">ผู้อนุมัติ</div>

  <div class="filter-row">
    <label for="stationFilter">กรองตามฐาน:</label>
    <select id="stationFilter" onchange="onFilterChange()">
      <option value="all">ทั้งหมด</option>
      <option value="กิจกรรมเข้าฐาน">กิจกรรมเข้าฐาน</option>
      <option value="Step 1 ขึ้นรูป">Step 1 ขึ้นรูป</option>
      <option value="Step 2 ตัดขอบ">Step 2 ตัดขอบ</option>
      <option value="Step 3 ตรวจสอบ">Step 3 ตรวจสอบ</option>
      <option value="Step 4 แพ็คสินค้า">Step 4 แพ็คสินค้า</option>
      <option value="บันทึกการเรียนรู้">บันทึกการเรียนรู้</option>
    </select>
  </div>

  <div class="refresh-row">
    <button class="refresh-btn" onclick="loadPending()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-2.3 5.7"></path><path d="M20 5v6h-6"></path></svg>
      รีเฟรช
    </button>
  </div>

  <div id="listContainer">
    <div class="empty-state">กำลังโหลดข้อมูล...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ตั้งค่า URL ของ Web App ที่ deploy จาก Code.gs
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyO96avgC5YUxykS-RTP_SfsTBxaaNkt8aH4x5-Zk5IqNhg39xw4CrjBAxdg0r2tNBzEQ/exec';

  const currentUser = JSON.parse(localStorage.getItem('tcp_user') || 'null');
  if (!currentUser || currentUser.role !== 'approver') {
    window.location.href = 'login.html';
  } else {
    document.getElementById('approverNameLabel').textContent = 'ผู้อนุมัติ: ' + (currentUser.fullName || currentUser.employeeId);
  }

  function logout() {
    localStorage.removeItem('tcp_user');
    window.location.href = 'login.html';
  }
  window.logout = logout;

  async function callApi(payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function escapeHtml(str) {
    return String(str || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function cardHtml(act) {
    return `
      <div class="approval-card" data-id="${escapeHtml(act.ID)}">
        <div class="approval-head">
          <div>
            <div class="name">${escapeHtml(act.FullName)}</div>
            <div class="activity">${escapeHtml(act.ActivityName)}</div>
          </div>
          <div class="status-tag">รออนุมัติ</div>
        </div>
        <div class="approval-detail">
          ${act.TimeIn ? '<b>วันที่:</b> ' + escapeHtml(act.Date || 'ไม่มีข้อมูลวันที่ (รายการเก่า)') + '&nbsp;&nbsp;<b>เวลาเข้า:</b> ' + escapeHtml(act.TimeIn) + '&nbsp;&nbsp;<b>เวลาออก:</b> ' + escapeHtml(act.TimeOut) : ''}
          ${act.Remark ? '<br><b>บันทึก:</b> ' + escapeHtml(act.Remark) : ''}
        </div>
        <div class="approval-actions">
          <button class="btn-approve" onclick="decide('${escapeHtml(act.ID)}', 'approve')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
            อนุมัติ
          </button>
          <button class="btn-reject" onclick="decide('${escapeHtml(act.ID)}', 'reject')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>
            ไม่อนุมัติ
          </button>
        </div>
      </div>
    `.trim();
  }

  let hasLoadedOnce = false;
  let allPendingActivities = []; // เก็บรายการเต็มที่ดึงมาล่าสุด ไว้กรองตามฐานที่เลือกโดยไม่ต้องยิง API ใหม่
  let currentFilter = 'all';

  function onFilterChange() {
    currentFilter = document.getElementById('stationFilter').value;
    renderFilteredList();
  }
  window.onFilterChange = onFilterChange;

  function renderFilteredList() {
    const filtered = currentFilter === 'all'
      ? allPendingActivities
      : allPendingActivities.filter(a => a.ActivityName === currentFilter);
    reconcileList(filtered);
  }

  async function loadPending() {
    const container = document.getElementById('listContainer');
    const isBackgroundPoll = hasLoadedOnce;

    // แสดง "กำลังโหลด..." เฉพาะตอนโหลดครั้งแรกเท่านั้น ไม่ใช่ทุกครั้งที่ poll พื้นหลัง
    if (!isBackgroundPoll) {
      container.innerHTML = '<div class="empty-state">กำลังโหลดข้อมูล...</div>';
    }

    try {
      const result = await callApi({ action: 'getPendingApprovals' });
      if (!result.ok) {
        if (!isBackgroundPoll) container.innerHTML = '<div class="empty-state">โหลดข้อมูลไม่สำเร็จ</div>';
        return; // อย่าล้มการแสดงผลเดิมถ้าเป็นแค่ poll พื้นหลังที่พลาด
      }
      hasLoadedOnce = true;
      allPendingActivities = result.activities || [];
      renderFilteredList();
    } catch (err) {
      if (!isBackgroundPoll) container.innerHTML = '<div class="empty-state">เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ</div>';
      // poll พื้นหลังพลาด: เงียบไว้ก่อน ปล่อยให้รอบถัดไปลองใหม่ ไม่รบกวนรายการที่แสดงอยู่
    }
  }

  // อัปเดตเฉพาะส่วนที่เปลี่ยนจริง (เพิ่มรายการใหม่ / เอารายการที่ถูกอนุมัติ-ปฏิเสธไปแล้วออก)
  // แทนที่จะล้าง innerHTML ทั้งก้อนแล้ววาดใหม่ทุกครั้ง เพื่อไม่ให้จอกระพริบ/เสียตำแหน่งสกอลล์
  function reconcileList(activities) {
    const container = document.getElementById('listContainer');
    const incomingIds = new Set(activities.map(a => String(a.ID)));
    const existingCards = Array.from(container.querySelectorAll('.approval-card'));
    const existingIds = new Set(existingCards.map(c => c.dataset.id));

    if (activities.length === 0) {
      if (existingCards.length > 0 || container.querySelector('.empty-state') === null) {
        container.innerHTML = '<div class="empty-state">ไม่มีรายการรออนุมัติในขณะนี้ 🎉</div>';
      }
      return;
    }

    // เอา empty-state ออกถ้ามีอยู่ ก่อนจะเริ่มเติมการ์ด
    const emptyState = container.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    // ลบการ์ดที่ไม่อยู่ในรายการล่าสุดแล้ว (ถูกอนุมัติ/ปฏิเสธไปโดยคนอื่น หรือโดยตัวเราเองจากแท็บอื่น)
    existingCards.forEach(card => {
      if (!incomingIds.has(card.dataset.id)) card.remove();
    });

    // เติมการ์ดใหม่ที่ยังไม่เคยแสดง (การ์ดเดิมที่ยังอยู่จะไม่ถูกแตะต้องเลย)
    activities.forEach(act => {
      const id = String(act.ID);
      if (existingIds.has(id)) return; // มีอยู่แล้ว ไม่ต้องวาดซ้ำ
      const wrapper = document.createElement('div');
      wrapper.innerHTML = cardHtml(act);
      container.appendChild(wrapper.firstElementChild);
    });
  }

  async function decide(id, action) {
    const card = document.querySelector('.approval-card[data-id="' + id + '"]');
    if (!card) return;
    card.querySelectorAll('button').forEach(b => b.disabled = true);

    // Optimistic UI: เอาการ์ดออกจากหน้าจอทันทีที่กด ไม่ต้องรอ server ตอบกลับ
    // เก็บตำแหน่งเดิมไว้ เผื่อต้องเอากลับมาแสดงถ้า server ปฏิเสธ/เชื่อมต่อไม่สำเร็จ
    const container = document.getElementById('listContainer');
    const parent = card.parentElement;
    const nextSibling = card.nextElementSibling;
    card.remove();
    if (!container.querySelector('.approval-card')) {
      container.innerHTML = '<div class="empty-state">ไม่มีรายการรออนุมัติในขณะนี้ 🎉</div>';
    }

    // เอาออกจากรายการเต็มที่เก็บไว้ด้วย เผื่อผู้ใช้สลับตัวกรองฐานระหว่างรอ server ตอบกลับ
    const removedIndex = allPendingActivities.findIndex(a => String(a.ID) === String(id));
    const removedAct = removedIndex !== -1 ? allPendingActivities.splice(removedIndex, 1)[0] : null;

    try {
      const result = await callApi({
        action: action === 'approve' ? 'approveActivity' : 'rejectActivity',
        id: id,
        approverName: currentUser.fullName || currentUser.employeeId
      });
      if (result.ok) {
        showToast(result.message || 'บันทึกผลการอนุมัติแล้ว');
      } else {
        // server ปฏิเสธ (เช่นมีคนอื่นอนุมัติไปก่อนแล้ว) -> โหลดรายการจริงใหม่ทั้งหมดให้ตรงกับความจริง
        showToast(result.message || 'ดำเนินการไม่สำเร็จ');
        loadPending();
      }
    } catch (err) {
      // เชื่อมต่อไม่สำเร็จ -> เอาการ์ดกลับมาแสดงที่เดิม แล้วให้กดใหม่ได้
      showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ');
      if (removedAct && removedIndex !== -1) allPendingActivities.splice(removedIndex, 0, removedAct);
      const emptyState = container.querySelector('.empty-state');
      if (emptyState) emptyState.remove();
      card.querySelectorAll('button').forEach(b => b.disabled = false);
      if (nextSibling && nextSibling.parentElement === parent) {
        parent.insertBefore(card, nextSibling);
      } else if (parent) {
        parent.appendChild(card);
      }
    }
  }
  window.decide = decide;

  loadPending();

  // ตรวจรายการรออนุมัติใหม่ทุก 8 วินาทีโดยอัตโนมัติ ไม่ต้องกดรีเฟรชเอง
  setInterval(loadPending, 8000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) loadPending();
  });
</script>
</body>
</html>
